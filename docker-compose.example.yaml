name: home-immich-example

x-immich-server-env: &immich-server-env
  TZ: "<TIMEZONE>"
  IMMICH_LOG_LEVEL: "<IMMICH_LOG_LEVEL>"
  IMMICH_CONFIG_FILE: /etc/immich/config.json
  DB_HOSTNAME: immich-database
  DB_PORT: "5432"
  DB_USERNAME: "<DB_USERNAME>"
  DB_PASSWORD: "<ALNUM_ONLY_DB_PASSWORD>"
  DB_DATABASE_NAME: "<DB_NAME>"
  DB_VECTOR_EXTENSION: "<pgvector>"
  REDIS_HOSTNAME: immich-redis
  REDIS_PORT: "6379"

x-immich-ml-env: &immich-ml-env
  TZ: "<TIMEZONE>"
  IMMICH_LOG_LEVEL: "<IMMICH_LOG_LEVEL>"

services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    restart: unless-stopped
    network_mode: host
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      CLOUDFLARE_API_TOKEN: "<CLOUDFLARE_API_TOKEN>"
      DOMAINS: "<IMMICH_DOMAIN>,<OPTIONAL_OTHER_DOMAINS>"
      PROXIED: "<true-or-false>"
    volumes:
      - ./volumes/cloudflare-ddns/tmp:/tmp

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:<NPM_IMAGE_TAG>
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./volumes/nginx-proxy-manager/data:/data
      - ./volumes/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - public
    # In NPM, proxy https://<IMMICH_DOMAIN> to http://immich-server:2283

  immich-server:
    image: ghcr.io/immich-app/immich-server:v2
    restart: unless-stopped
    depends_on:
      - immich-database
      - immich-redis
      - immich-machine-learning
    expose:
      - "2283"
    environment: *immich-server-env
    volumes:
      - ./volumes/immich/library:/data
      - ./volumes/immich/generated/thumbs:/data/thumbs
      - ./volumes/immich/generated/encoded-video:/data/encoded-video
      - ./volumes/immich/generated/profile:/data/profile
      - ./volumes/immich/generated/backups:/data/backups
      - ./volumes/immich/config:/etc/immich
    networks:
      - public
      - immich-backend
    # Put ./volumes/immich/config/config.json here with placeholder values,
    # for example externalDomain=https://<IMMICH_DOMAIN> and the machine
    # learning URL http://immich-machine-learning:3003.

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2
    restart: unless-stopped
    expose:
      - "3003"
    environment: *immich-ml-env
    volumes:
      - ./volumes/immich/model-cache:/cache
    networks:
      - immich-backend

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - immich-backend

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_PASSWORD: "<ALNUM_ONLY_DB_PASSWORD>"
      POSTGRES_USER: "<DB_USERNAME>"
      POSTGRES_DB: "<DB_NAME>"
      POSTGRES_INITDB_ARGS: "--data-checksums"
      DB_STORAGE_TYPE: "<SSD-or-HDD>"
    volumes:
      - ./volumes/immich/postgres:/var/lib/postgresql/data
    networks:
      - immich-backend

networks:
  public:
  immich-backend:
