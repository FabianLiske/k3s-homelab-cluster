apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pelican-data
  namespace: svc-games
  labels:
    recurring-job.longhorn.io/source: enabled
    recurring-job.longhorn.io/backup-daily: enabled
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn-2r-immediate
