apiVersion: v1
kind: ConfigMap
metadata:
  name: pelican-caddy
  namespace: svc-games
data:
  Caddyfile: |
    {
        servers {
            {$CADDY_TRUSTED_PROXIES}
            {$CADDY_STRICT_PROXIES}
        }
        admin off
        {$CADDY_AUTO_HTTPS}
        {$CADDY_LE_EMAIL}
    }

    {$CADDY_APP_URL} {
        root * /var/www/html/public
        encode gzip

        php_fastcgi 127.0.0.1:9000 {
            env PHP_VALUE "upload_max_filesize = 256M
                           post_max_size = 256M"
        }
        file_server
    }
