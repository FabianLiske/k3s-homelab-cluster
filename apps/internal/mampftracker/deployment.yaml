apiVersion: apps/v1
kind: Deployment
metadata:
  name: mampftracker
  namespace: svc-mampftracker
  labels:
    app: mampftracker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mampftracker
  template:
    metadata:
      labels:
        app: mampftracker
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: mampftracker
          image: ghcr.io/fabianliske/mampftracker:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_PATH
              value: /data/mampftracker.db
            - name: OPENFOODFACTS_USER_AGENT
              value: "MampfTracker/0.1 (mampf.rohrbom.be)"
            - name: TZ
              value: Europe/Berlin
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mampftracker-data
        - name: tmp
          emptyDir: {}
