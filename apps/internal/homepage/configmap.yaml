apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: svc-homepage
data:
  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/FabianLiske
        - Compressor:
            - abbr: IC
              href: https://compressor.intern.rohrbom.be/
        - Immich Photos:
            - abbr: IM
              href: https://immich.rohrbom.be/photos
  custom.css: |
    #information-widgets {
      margin: 0.75rem 1rem 0 !important;
      padding-bottom: 0.75rem !important;
    }

    #layout-groups,
    #bookmarks {
      margin: 0.75rem 1rem 0 !important;
    }

    .services-group,
    .bookmark-group {
      padding: 0.2rem !important;
    }

    .services-list,
    .bookmark-list {
      margin-top: 0.5rem !important;
      margin-bottom: 0.25rem !important;
      gap: 0.5rem !important;
    }

    .service-group-name,
    .bookmark-group-name {
      font-size: 1.05rem !important;
      line-height: 1.3 !important;
    }

    .service-card {
      margin-bottom: 0.5rem !important;
      padding: 0.15rem !important;
      border-radius: 0.6rem !important;
    }

    .service-name {
      padding: 0.55rem 0.7rem !important;
      font-size: 0.85rem !important;
      line-height: 1.2 !important;
    }

    .service-description {
      margin-top: 0.15rem !important;
      font-size: 0.72rem !important;
      line-height: 1.15 !important;
    }

    .site-monitor-status {
      padding: 0.8rem !important;
    }

    .bookmark-list .bookmark a {
      margin-bottom: 0.5rem !important;
    }

    .bookmark-icon {
      width: 2.5rem !important;
    }

    .bookmark-name,
    .bookmark-description {
      padding-top: 0.55rem !important;
      padding-bottom: 0.55rem !important;
    }

    .bookmark-name {
      padding-left: 0.75rem !important;
    }

    .information-widget-form > div {
      height: 2rem !important;
    }

    @media (min-width: 1280px) {
      #inner_wrapper .container {
        max-width: 96rem !important;
      }

      #layout-groups .services-list {
        grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
      }

      #bookmarks .bookmark-group {
        flex-basis: 18rem !important;
        max-width: 18rem !important;
      }
    }

    @media (min-width: 1536px) {
      #layout-groups .services-list {
        grid-template-columns: repeat(6, minmax(0, 1fr)) !important;
      }
    }
  custom.js: ""
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
    ingress: true
  proxmox.yaml: ""
