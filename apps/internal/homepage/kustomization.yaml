apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: svc-homepage
labels:
  - pairs:
      app: homepage
      gitops: flux
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - homepage-secret.yaml
