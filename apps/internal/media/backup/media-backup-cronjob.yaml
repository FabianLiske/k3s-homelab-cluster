apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-backup
  namespace: svc-media
  labels:
    app: media-backup
spec:
  schedule: "30 4 * * *"
  timeZone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: media-backup
        spec:
          nodeSelector:
            dedicated: media
            kubernetes.io/arch: amd64
          tolerations:
            - key: dedicated
              operator: Equal
              value: media
              effect: NoSchedule
          restartPolicy: OnFailure
          containers:
            - name: rsync
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  apk add --no-cache rsync curl

                  notify() {
                    title="$1"
                    priority="$2"
                    tags="$3"
                    message="$4"

                    curl -fsS --retry 3 --retry-delay 2 \
                      -H "Authorization: Bearer ${NTFY_TOKEN}" \
                      -H "Title: ${title}" \
                      -H "Priority: ${priority}" \
                      -H "Tags: ${tags}" \
                      -d "${message}" \
                      "${NTFY_URL}/${NTFY_TOPIC}" >/dev/null || \
                      echo "Failed to send ntfy notification" >&2
                  }

                  started_at="$(date -Is)"
                  started_ts="$(date +%s)"

                  set +e
                  rsync -aH --numeric-ids --delete-delay --partial --human-readable --stats \
                    --exclude='/immich/**' \
                    --exclude='/lost+found' \
                    /source/ /target/
                  status="$?"
                  set -e

                  duration="$(( $(date +%s) - started_ts ))s"

                  if [ "${status}" -eq 0 ]; then
                    notify "Media backup completed" "default" "white_check_mark" \
                      "media-backup completed successfully. Started: ${started_at}. Duration: ${duration}."
                  else
                    notify "Media backup failed" "high" "warning" \
                      "media-backup failed with exit code ${status}. Started: ${started_at}. Duration: ${duration}."
                    exit "${status}"
                  fi
              env:
                - name: NTFY_URL
                  value: "https://ntfy.rohrbom.be"
                - name: NTFY_TOPIC
                  value: "homelab"
                - name: NTFY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: media-backup-ntfy
                      key: token
              volumeMounts:
                - name: media
                  mountPath: /source
                  readOnly: true
                - name: backup-target
                  mountPath: /target
          volumes:
            - name: media
              persistentVolumeClaim:
                claimName: media-cold-data
                readOnly: true
            - name: backup-target
              nfs:
                server: 172.26.60.223
                path: /mnt/tank/backups/media
