apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: svc-ntfy
  labels: { app: ntfy }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app: ntfy } }
  template:
    metadata:
      labels: { app: ntfy }
      annotations:
        ntfy.rohrbom.be/config-revision: "2026-06-15-truenas-alerts"
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:latest
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          ports:
            - { name: http, containerPort: 80 }
          envFrom:
            - configMapRef: { name: ntfy-config }
            - secretRef: { name: ntfy-secret }
          volumeMounts:
            - { name: data, mountPath: /var/lib/ntfy }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: ntfy-data }
