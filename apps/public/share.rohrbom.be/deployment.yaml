apiVersion: apps/v1
kind: Deployment
metadata:
  name: jirafeau
  namespace: svc-jirafeau
  labels: { app: jirafeau }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: jirafeau }
  template:
    metadata:
      labels: { app: jirafeau }
    spec:
      containers:
        - name: jirafeau
          image: registry.gitlab.com/jirafeau/jirafeau:4.7.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              /cleanup.sh &
              php-fpm -D
              php /docker_config.php
              sed -i "s/'link_name_length' => 8,/'link_name_length' => 32,/" /www/lib/config.local.php
              grep -q "'link_name_length' => 32," /www/lib/config.local.php
              exec lighttpd -D -f /etc/lighttpd/lighttpd.conf
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: jirafeau-config
            - secretRef:
                name: jirafeau-secret
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jirafeau-data
