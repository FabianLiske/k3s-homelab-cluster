apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-model-cache-data-pv
  labels:
    app.kubernetes.io/part-of: immich
spec:
  capacity:
    storage: 30Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: media-local
  local:
    path: /data/immich/model-cache
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - media-1
