apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: svc-immich
  labels:
    app: immich-machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      enableServiceLinks: false
      nodeSelector:
        dedicated: media
        kubernetes.io/arch: amd64
      tolerations:
        - key: dedicated
          operator: Equal
          value: media
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: immich-env
                  key: TZ
            - name: IMMICH_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: immich-env
                  key: IMMICH_LOG_LEVEL
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-model-cache-data
