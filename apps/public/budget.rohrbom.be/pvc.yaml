apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actualbudget-data
  namespace: svc-actualbudget
  labels:
    recurring-job.longhorn.io/source: enabled
    recurring-job.longhorn.io/backup-hourly: enabled
    recurring-job.longhorn.io/backup-daily: enabled
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-2r
  resources:
    requests:
      storage: 2Gi
