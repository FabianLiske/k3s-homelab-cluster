apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: pool-vlan100-admin
  namespace: metallb-system
spec:
  addresses: ["172.26.100.150-172.26.100.199"]
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: adv-vlan100-admin-eth0
  namespace: metallb-system
spec:
  ipAddressPools: ["pool-vlan100-admin"]
  nodeSelectors:
    - matchLabels:
        metallb.rohrbom.be/vlan100-uplink: eth0
  interfaces: ["eth0"]
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: adv-vlan100-admin-enp8s0
  namespace: metallb-system
spec:
  ipAddressPools: ["pool-vlan100-admin"]
  nodeSelectors:
    - matchLabels:
        metallb.rohrbom.be/vlan100-uplink: enp8s0
  interfaces: ["enp8s0"]