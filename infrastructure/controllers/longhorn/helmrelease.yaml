apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: longhorn-system
  values:
    global:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "media"
          effect: "NoSchedule"

    defaultSetting:
      createDefaultDiskLabeledNodes: true
      taintToleration: "dedicated=media:NoSchedule"