apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpoller
  namespace: ops-monitoring
  labels: { app: unpoller }
spec:
  replicas: 1
  selector:
    matchLabels: { app: unpoller }
  template:
    metadata:
      labels: { app: unpoller }
    spec:
      containers:
        - name: unpoller
          image: ghcr.io/unpoller/unpoller:v2.38.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: unpoller-secret
          ports:
            - { name: metrics, containerPort: 9130 }
          readinessProbe:
            httpGet: { path: /metrics, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /metrics, port: metrics }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
