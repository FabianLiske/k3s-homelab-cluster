apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-allow-ops
  namespace: ops-monitoring
spec:
  podSelector: { matchLabels: { app: loki } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: ops-monitoring }
      ports:
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 9095
