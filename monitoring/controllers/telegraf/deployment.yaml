apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  namespace: ops-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegraf
  template:
    metadata:
      labels:
        app: telegraf
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: telegraf
          image: ghcr.io/fabianliske/k3s-homelab-cluster/telegraf-custom:latest
          command:
            - telegraf
            - --config
            - /etc/telegraf/telegraf.conf
            - --config-directory
            - /etc/telegraf/telegraf.d
          env:
            - name: IPMI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: telegraf-secret
                  key: IPMI_USERNAME
            - name: IPMI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: telegraf-secret
                  key: IPMI_PASSWORD
            - name: INFLUXDB_NETWORK
              valueFrom:
                secretKeyRef:
                  name: telegraf-secret
                  key: INFLUXDB_NETWORK
            - name: INFLUXDB_SERVER
              valueFrom:
                secretKeyRef:
                  name: telegraf-secret
                  key: INFLUXDB_SERVER
            - name: INFLUXDB_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: telegraf-secret
                  key: INFLUXDB_CLUSTER
          volumeMounts:
            - name: telegraf-main
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
            - name: telegraf-ipmi-h12
              mountPath: /etc/telegraf/telegraf.d/20-ipmi-h12.conf
              subPath: 20-ipmi-h12.conf
              readOnly: true
            - name: telegraf-ipmi-h11
              mountPath: /etc/telegraf/telegraf.d/21-ipmi-h11.conf
              subPath: 21-ipmi-h11.conf
              readOnly: true
      volumes:
        - name: telegraf-main
          configMap:
            name: telegraf-main
        - name: telegraf-ipmi-h12
          configMap:
            name: telegraf-ipmi-h12
        - name: telegraf-ipmi-h11
          configMap:
            name: telegraf-ipmi-h11
