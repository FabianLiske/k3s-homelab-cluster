apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: ops-monitoring
data:
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
      - name: unpoller
        orgId: 1
        folder: UniFi (UnPoller)
        folderUid: unifi-unpoller
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/unpoller
