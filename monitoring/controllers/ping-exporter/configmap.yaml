apiVersion: v1
kind: ConfigMap
metadata:
  name: ping-exporter-config
  namespace: ops-monitoring
data:
  config.yml: |
    targets:
      - 8.8.8.8
      - 1.1.1.1
      - host: google.com
        asn: "15169"

    dns:
      refresh: 2m15s
      nameserver: 1.1.1.1

    ping:
      interval: 2s
      timeout: 3s
      history-size: 42
      payload-size: 120

    options:
      disableIPv6: false
